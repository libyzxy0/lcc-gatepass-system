name: Build and deploy Python app to Azure Web App - lccmqtt

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Create venv and Install dependencies
        # Use 'working-directory' so bash commands run inside the subfolder
        working-directory: ./mqtt-webhook
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt
                
      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          # This sets the "root" of your deployment to the contents of mqttwebhook
          path: |
            mqtt-webhook/
            !mqtt-webhook/antenv/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_2582033781134010BC4B238138873BB1 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_D6344AEB273C4ED2A597462A2D287738 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_171BBFB5B1104C3C8E779CC4A87B97F5 }}

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'lccmqtt'
          slot-name: 'Production'
          # Since the artifact ONLY contains the contents of mqttwebhook, 
          # we deploy the current directory ('.')
          package: .

