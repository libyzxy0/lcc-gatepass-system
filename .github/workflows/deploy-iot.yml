name: Deploy IoT Worker

on:
  push:
    branches: [ "main" ]
    paths:
      - "comm/**" 
jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: comm

    steps:
      - uses: actions/checkout@v4

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: comm
          